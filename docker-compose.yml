version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: specflow
      POSTGRES_PASSWORD: specflow
      POSTGRES_DB: specflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U specflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  ai:
    build: ./services/ai
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - COPILOT_API_KEY=${COPILOT_API_KEY:-}
    volumes:
      - ./services/ai:/app

  api:
    build: ./apps/api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://specflow:specflow@postgres:5432/specflow
      - AI_SERVICE_URL=http://ai:8000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      ai:
        condition: service_started
    command: sh -c "npx prisma migrate deploy --schema=/app/packages/database/prisma/schema.prisma && node dist/index.js"

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
